<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingDuo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: #000;
            text-decoration: none;
            margin-right: 15px;
        }
        .navbar .btn-danger {
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 5px;
            color: #fff;
            background-color: #dc3545;
            border: none;
        }
        .navbar .btn-danger:hover {
            background-color: #c82333;
            text-decoration: none;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .table-container {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
        }
        .table-container h5 {
            text-align: center;
            margin-bottom: 15px;
        }
        .btn {
            margin: 10px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div>
            <a href="{{ url_for('admin_dashboard') }}">Home</a>
            <a href="{{ url_for('users') }}" class="active">Konta</a>
            <a href="{{ url_for('groups') }}" class="active">Grupy</a>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Wyloguj</a>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="table-container">
            <h5>Stworzone Grupy</h5>
            <table class="table table-bordered" id="groups-table">
                <thead>
                    <tr>
                        <th>Id_grupy</th>
                        <th>Język</th>
                        <th>Nauczyciel</th>
                        <th>Termin zajęć</th>
                        <th>Przypisani Uczniowie</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    {% for group in groups %}
                    <tr data-id="{{ group.id }}">
                        <td>
                            <span>{{ group.group_id }}</span>
                            <input type="text" class="form-control d-none" value="{{ group.group_id }}">
                        </td>
                        <td>
                            <span>{{ group.language }}</span>
                            <select class="form-control d-none language-select">
                                {% for language in all_languages %}
                                <option value="{{ language }}" {% if language == group.language %}selected{% endif %}>
                                    {{ language }}
                                </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <span>{{ group.teacher }}</span>
                            <select class="form-control d-none teacher-select">
                                {% for teacher in all_teachers %}
                                <option value="{{ teacher.id }}" {% if teacher.id == group.teacher_id %}selected{% endif %}>
                                    {{ teacher.first_name }} {{ teacher.last_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <span>{{ group.schedule }}</span>
                            <select class="form-control d-none schedule-select">
                                {% for schedule in all_schedules %}
                                <option value="{{ schedule }}" {% if schedule == group.schedule %}selected{% endif %}>
                                    {{ schedule }}
                                </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <span>{{ group.students | join(', ') }}</span>
                            <select multiple class="form-control d-none student-select">
                                {% for student in all_students %}
                                <option value="{{ student.id }}" {% if student.id in group.student_ids %}selected{% endif %}>
                                    {{ student.first_name }} {{ student.last_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <button class="btn btn-warning btn-sm edit-group">Edytuj</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Obsługa przycisku "Edytuj"
            document.querySelectorAll('.edit-group').forEach(button => {
                button.addEventListener('click', function () {
                    const row = this.closest('tr');
                    const spans = row.querySelectorAll('span');
                    const inputs = row.querySelectorAll('input, select');

                    // Ukrywamy tekst (span), pokazujemy pola edycyjne (input/select)
                    spans.forEach(span => span.classList.add('d-none'));
                    inputs.forEach(input => input.classList.remove('d-none'));

                    // Zmiana przycisku "Edytuj" na "Zapisz"
                    this.textContent = 'Zapisz';
                    this.classList.remove('btn-warning');
                    this.classList.add('btn-success');
                    this.classList.remove('edit-group');
                    this.classList.add('save-edit-group');

                    // Obsługa zapisywania danych
                    this.addEventListener('click', function saveGroupEdit() {
                        const groupData = {
                            id: row.dataset.id,
                            group_id: row.querySelector('input').value.trim(),
                            language: row.querySelector('.language-select').value,
                            teacher: row.querySelector('.teacher-select').value,
                            schedule: row.querySelector('.schedule-select').value,
                            students: Array.from(row.querySelector('.student-select').selectedOptions).map(option => option.value)
                        };

                        // Wysłanie danych na serwer
                        fetch('/edit_group', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(groupData)
                        }).then(response => {
                            if (response.ok) {
                                alert('Zmiany zapisane!');
                                location.reload();
                            } else {
                                alert('Błąd przy zapisie.');
                            }
                        });

                        // Przywracanie widoku tekstowego
                        inputs.forEach(input => input.classList.add('d-none'));
                        spans.forEach((span, index) => {
                            const value = Object.values(groupData)[index + 1];
                            span.textContent = Array.isArray(value) ? value.join(', ') : value;
                            span.classList.remove('d-none');
                        });

                        // Przywrócenie przycisku "Edytuj"
                        this.textContent = 'Edytuj';
                        this.classList.remove('btn-success');
                        this.classList.add('btn-warning');
                        this.classList.remove('save-edit-group');
                        this.classList.add('edit-group');

                        this.removeEventListener('click', saveGroupEdit); // Usuń zdarzenie
                    }, { once: true });
                });
            });
        });
    </script>
</body>
</html>
