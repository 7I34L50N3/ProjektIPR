<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingDuo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: #000;
            text-decoration: none;
            margin-right: 15px;
        }
        .navbar .btn-danger {
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 5px;
            color: #fff;
            background-color: #dc3545;
            border: none;
        }
        .navbar .btn-danger:hover {
            background-color: #c82333;
            text-decoration: none;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .table-container {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
        }
        .table-container h5 {
            text-align: center;
            margin-bottom: 15px;
        }
        .btn {
            margin: 10px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div>
            <a href="{{ url_for('admin_dashboard') }}">Home</a>
            <a href="{{ url_for('users') }}" class="active">Konta</a>
            <a href="#">Grupy</a>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Wyloguj</a>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="table-container">
            <h5>Stworzone Konta</h5>
            <table class="table table-bordered" id="users-table">
                <thead>
                    <tr>
                        <th>Imię</th>
                        <th>Nazwisko</th>
                        <th>Rola</th>
                        <th>Konto</th>
                        <th>Hasło</th>
                        <th>Edytuj</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.first_name }}</td>
                        <td>{{ user.last_name }}</td>
                        <td>{{ user.role }}</td>
                        <td>{{ user.account }}</td>
                        <td>{{ user.password }}</td>
                        <td>
                            <button class="btn btn-warning btn-sm">Edytuj</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div>
                <button class="btn btn-primary" id="add-user">Utwórz nowe konto</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('add-user').addEventListener('click', function() {
            const table = document.getElementById('users-table').getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();

            // Dodaj pola tekstowe w nowym wierszu
            newRow.innerHTML = `
                <td><input type="text" class="form-control" placeholder="Imię"></td>
                <td><input type="text" class="form-control" placeholder="Nazwisko"></td>
                <td><input type="text" class="form-control" placeholder="Rola"></td>
                <td><input type="text" class="form-control" placeholder="Konto"></td>
                <td><input type="password" class="form-control" placeholder="Hasło"></td>
                <td><button class="btn btn-success btn-sm save-user">Zapisz</button></td>
            `;

            // Obsługa przycisku "Zapisz"
            newRow.querySelector('.save-user').addEventListener('click', function() {
                const inputs = newRow.getElementsByTagName('input');
                const userData = {
                    first_name: inputs[0].value,
                    last_name: inputs[1].value,
                    role: inputs[2].value,
                    account: inputs[3].value,
                    password: inputs[4].value
                };

                // Wyślij dane do backendu
                fetch('/add_user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                }).then(response => {
                    if (response.ok) {
                        alert('Użytkownik został zapisany!');
                        location.reload(); // Odśwież stronę
                    } else {
                        alert('Wystąpił błąd podczas zapisywania użytkownika.');
                    }
                });
            });
        });
    </script>
</body>
</html>
