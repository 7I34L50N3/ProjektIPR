<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingDuo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: #000;
            text-decoration: none;
            margin-right: 15px;
        }
        .navbar .btn-danger {
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 5px;
            color: #fff;
            background-color: #dc3545;
            border: none;
        }
        .navbar .btn-danger:hover {
            background-color: #c82333;
            text-decoration: none;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .table-container {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
        }
        .table-container h5 {
            text-align: center;
            margin-bottom: 15px;
        }
        .btn {
            margin: 10px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div>
            <a href="{{ url_for('admin_dashboard') }}">Home</a>
            <a href="{{ url_for('users') }}" class="active">Konta</a>
            <a href="#">Grupy</a>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Wyloguj</a>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="table-container">
            <h5>Stworzone Konta</h5>
            <table class="table table-bordered" id="users-table">
                <thead>
                    <tr>
                        <th>Imię</th>
                        <th>Nazwisko</th>
                        <th>Rola</th>
                        <th>Konto</th>
                        <th>Hasło</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr data-id="{{ user.id }}">
                        <td><span>{{ user.first_name }}</span><input type="text" class="form-control d-none" value="{{ user.first_name }}"></td>
                        <td><span>{{ user.last_name }}</span><input type="text" class="form-control d-none" value="{{ user.last_name }}"></td>
                        <td><span>{{ user.role }}</span><input type="text" class="form-control d-none" value="{{ user.role }}"></td>
                        <td><span>{{ user.account }}</span><input type="text" class="form-control d-none" value="{{ user.account }}"></td>
                        <td><span>{{ user.password }}</span><input type="text" class="form-control d-none" value="{{ user.password }}"></td>
                        <td>
                            <button class="btn btn-warning btn-sm edit-user">Edytuj</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div>
                <button class="btn btn-primary" id="add-user">Utwórz nowe konto</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Dodawanie nowego użytkownika
            document.getElementById('add-user').addEventListener('click', function () {
                const table = document.getElementById('users-table').getElementsByTagName('tbody')[0];
                const newRow = table.insertRow();

                // Dodaj pola tekstowe w nowym wierszu
                newRow.innerHTML = `
                    <td><input type="text" class="form-control" placeholder="Imię"></td>
                    <td><input type="text" class="form-control" placeholder="Nazwisko"></td>
                    <td><input type="text" class="form-control" placeholder="Rola"></td>
                    <td><input type="text" class="form-control" placeholder="Konto"></td>
                    <td><input type="password" class="form-control" placeholder="Hasło"></td>
                    <td><button class="btn btn-success btn-sm save-user">Zapisz</button></td>
                `;

                // Obsługa przycisku "Zapisz" dla nowego użytkownika
                newRow.querySelector('.save-user').addEventListener('click', function () {
                    const inputs = newRow.querySelectorAll('input');
                    const userData = {
                        first_name: inputs[0].value.trim(),
                        last_name: inputs[1].value.trim(),
                        role: inputs[2].value.trim(),
                        account: inputs[3].value.trim(),
                        password: inputs[4].value.trim()
                    };

                    console.log('Dodawanie użytkownika:', userData); // Debugowanie danych

                    // Wyślij dane do backendu
                    fetch('/add_user', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(userData)
                    }).then(response => {
                        if (response.ok) {
                            alert('Użytkownik został dodany!');
                            location.reload(); // Odśwież stronę
                        } else {
                            alert('Wystąpił błąd podczas dodawania użytkownika.');
                        }
                    });
                });
            });

            // Obsługa edycji istniejących użytkowników
            document.querySelectorAll('.edit-user').forEach(button => {
                button.addEventListener('click', function () {
                    const row = this.closest('tr');
                    const spans = row.querySelectorAll('span');
                    const inputs = row.querySelectorAll('input');

                    // Pokazujemy pola input i ukrywamy spany
                    spans.forEach(span => span.classList.add('d-none'));
                    inputs.forEach(input => input.classList.remove('d-none'));

                    // Zmień przycisk "Edytuj" na "Zapisz"
                    this.textContent = 'Zapisz';
                    this.classList.remove('btn-warning');
                    this.classList.add('btn-success');
                    this.classList.remove('edit-user');
                    this.classList.add('save-edit-user');

                    // Obsługa kliknięcia przycisku "Zapisz"
                    this.addEventListener('click', function saveUserEdit() {
                        const userData = {
                            id: row.dataset.id,
                            first_name: inputs[0].value.trim(),
                            last_name: inputs[1].value.trim(),
                            role: inputs[2].value.trim(),
                            account: inputs[3].value.trim(),
                            password: inputs[4].value.trim()
                        };

                        console.log("Dane użytkownika do wysłania:", userData);

                        // Wyślij dane do backendu
                        fetch('/edit_user', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(userData)
                        }).then(response => {
                            if (response.ok) {
                                alert('Zmiany zostały zapisane!');
                                location.reload(); // Odśwież stronę
                            } else {
                                alert('Wystąpił błąd podczas zapisywania zmian.');
                            }
                        });

                        this.removeEventListener('click', saveUserEdit); // Usuń zdarzenie, aby uniknąć wielokrotnego przypisywania
                    }, { once: true }); // Dodaj { once: true } dla jednorazowego wykonania
                });
            });
        });
    </script>
</body>
</html>
