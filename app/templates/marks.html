<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingDuo</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: #000;
            text-decoration: none;
            margin-right: 15px;
        }
        .navbar a:hover {
            text-decoration: none;
        }
        .navbar .btn-danger {
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 5px;
            color: #fff;
            background-color: #dc3545;
            border: none;
        }
        .navbar .btn-danger:hover {
            background-color: #c82333;
            text-decoration: none;
        }
        .main-container {
            padding: 20px;
        }
        .table-container {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>
            <a href="{{ url_for('student_dashboard') }}">Home</a>
            <a href="#">Uczeń</a>
            <a href="{{ url_for('student_marks') }}">Oceny</a>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Wyloguj</a>
    </div>

    <div class="main-container">
        <div class="mb-3">
            <label for="groupDropdown" class="form-label">Wybór grupy</label>
            <select id="groupDropdown" class="form-select" onchange="updateTable(this.value)">
                {% for group in groups %}
                <option value="{{ group }}" {% if group == selected_group %}selected{% endif %}>{{ group }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="table-container">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Zadanie</th>
                        <th>Ocena</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    {% for task in tasks_and_grades[selected_group] %}
                    <tr>
                        <td>{{ task.task }}</td>
                        <td>{{ task.grade }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const tasksAndGrades = {{ tasks_and_grades|tojson }};
        const tasksTableBody = document.getElementById('tasksTableBody');

        function updateTable(selectedGroup) {
            tasksTableBody.innerHTML = '';
            tasksAndGrades[selectedGroup].forEach(task => {
                const row = `<tr>
                    <td>${task.task}</td>
                    <td>${task.grade}</td>
                </tr>`;
                tasksTableBody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
