<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingDuo</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: #000;
            text-decoration: none;
            margin-right: 15px;
        }
        .navbar button {
            background-color: #dc3545;
            border: none;
            color: #fff;
            padding: 5px 15px;
            border-radius: 5px;
        }
        .navbar .btn-danger {
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 5px;
            color: #fff;
            background-color: #dc3545;
            border: none;
        }
        .navbar .btn-danger:hover {
            background-color: #c82333;
            text-decoration: none;
        }
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
        }
        .sidebar .profile img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #e9ecef;
            padding: 10px;
            margin: 0 auto;
            display: block;
        }
        .sidebar .profile h3 {
            text-align: center;
            margin-top: 10px;
        }
        .sidebar .profile button {
            margin-top: 10px;
            width: 100%;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            color: #000;
        }
        .content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .calendar-section {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
        }
        .calendar-header {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .calendar-grid div {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
        }
        .calendar-grid .day-cell {
            cursor: pointer;
        }
        .calendar-grid .selected {
            background-color: #28a745;
            color: #fff;
            font-weight: bold;
        }
        .table-section {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>
            <a href="{{ url_for('admin_dashboard') }}">Home</a>
            <a href="{{ url_for('users') }}">Konta</a>
            <a href="{{ url_for('groups') }}">Grupy</a>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Wyloguj</a>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="profile">
                <img src="{{ url_for('static', filename='images/avatar.png') }}" alt="Profile">
                <h3>{{ username }}</h3>
                <button onclick="window.location.href='{{ url_for('account_info') }}'">Informacje o koncie</button>
            </div>
        </div>

        <div class="content">
            <div class="calendar-section">
                <div class="calendar-header">Ładowanie...</div>
                <div class="calendar-grid"></div>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", function() {
                    function generateCalendar(year, month) {
                        const calendarGrid = document.querySelector('.calendar-grid');
                        const calendarHeader = document.querySelector('.calendar-header');

                        const monthNames = [
                            "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
                            "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
                        ];
                        const daysOfWeek = ['Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob', 'Nie'];

                        calendarHeader.textContent = `${monthNames[month]} ${year}`;
                        calendarGrid.innerHTML = '';

                        daysOfWeek.forEach(day => {
                            const dayCell = document.createElement('div');
                            dayCell.textContent = day;
                            dayCell.style.fontWeight = 'bold';
                            calendarGrid.appendChild(dayCell);
                        });

                        const firstDay = new Date(year, month, 1).getDay();
                        const daysInMonth = new Date(year, month + 1, 0).getDate();
                        const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;

                        for (let i = 0; i < adjustedFirstDay; i++) {
                            const emptyCell = document.createElement('div');
                            calendarGrid.appendChild(emptyCell);
                        }

                        for (let day = 1; day <= daysInMonth; day++) {
                            const dayCell = document.createElement('div');
                            dayCell.textContent = day;
                            dayCell.className = 'day-cell';

                            const now = new Date();
                            if (day === now.getDate() && year === now.getFullYear() && month === now.getMonth()) {
                                dayCell.classList.add('selected');
                            }

                            calendarGrid.appendChild(dayCell);
                        }
                    }

                    const now = new Date();
                    const currentYear = now.getFullYear();
                    const currentMonth = now.getMonth();

                    generateCalendar(currentYear, currentMonth);
                });
            </script>

            <div class="table-section">
                <h5>Tabela</h5>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nazwa</th>
                            <th>Liczba</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Uczniowie</td>
                            <td>{{ students }}</td>
                        </tr>
                        <tr>
                            <td>Nauczyciele</td>
                            <td>{{ teachers }}</td>
                        </tr>
                        <tr>
                            <td>Grupy językowe</td>
                            <td>{{ groups }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
