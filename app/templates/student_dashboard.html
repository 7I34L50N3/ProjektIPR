<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingDuo - Uczeń</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: #000;
            text-decoration: none;
            margin-right: 15px;
        }
        .navbar .btn-danger {
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 5px;
            color: #fff;
            background-color: #dc3545;
            border: none;
        }
        .navbar .btn-danger:hover {
            background-color: #c82333;
            text-decoration: none;
        }
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
        }
        .sidebar .profile img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #e9ecef;
            padding: 10px;
            margin: 0 auto;
            display: block;
        }
        .sidebar .profile h3 {
            text-align: center;
            margin-top: 10px;
        }
        .sidebar .profile button {
            margin-top: 10px;
            width: 100%;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            color: #000;
        }
        .content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .calendar-section {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
        }
        .calendar-header {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .calendar-grid div {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
        }
        .calendar-grid .day-cell {
            cursor: pointer;
        }
        .calendar-grid .selected {
            background-color: #28a745;
            color: #fff;
            font-weight: bold;
        }
        .schedule {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>
            <a href="#">Home</a>
            <a href="#">Uczeń</a>
            <a href="#">Oceny</a>
        </div>
        <a href="#" class="btn btn-danger">Wyloguj</a>
    </div>

    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="profile">
                <img src="https://via.placeholder.com/100" alt="Profile">
                <h3>Uczeń_Maciek</h3>
                <button>Informacje o koncie</button>
                <button>Terminarz</button>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Calendar Section -->
            <div class="calendar-section">
                <div class="calendar-header">Ładowanie...</div>
                <div class="calendar-grid"></div>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", function() {
                    function generateCalendar(year, month) {
                        const calendarGrid = document.querySelector('.calendar-grid');
                        const calendarHeader = document.querySelector('.calendar-header');

                        const monthNames = [
                            "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
                            "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
                        ];
                        const daysOfWeek = ['Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob', 'Nie'];

                        calendarHeader.textContent = `${monthNames[month]} ${year}`;
                        calendarGrid.innerHTML = '';

                        daysOfWeek.forEach(day => {
                            const dayCell = document.createElement('div');
                            dayCell.textContent = day;
                            dayCell.style.fontWeight = 'bold';
                            calendarGrid.appendChild(dayCell);
                        });

                        const firstDay = new Date(year, month, 1).getDay();
                        const daysInMonth = new Date(year, month + 1, 0).getDate();
                        const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;

                        for (let i = 0; i < adjustedFirstDay; i++) {
                            const emptyCell = document.createElement('div');
                            calendarGrid.appendChild(emptyCell);
                        }

                        for (let day = 1; day <= daysInMonth; day++) {
                            const dayCell = document.createElement('div');
                            dayCell.textContent = day;
                            dayCell.className = 'day-cell';

                            const now = new Date();
                            if (day === now.getDate() && year === now.getFullYear() && month === now.getMonth()) {
                                dayCell.classList.add('selected');
                            }

                            calendarGrid.appendChild(dayCell);
                        }
                    }

                    const now = new Date();
                    const currentYear = now.getFullYear();
                    const currentMonth = now.getMonth();

                    generateCalendar(currentYear, currentMonth);
                });
            </script>

            <!-- Schedule Section -->
            <div class="schedule">
                <h5>Plan zajęć</h5>
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                    <li>Item 4</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
